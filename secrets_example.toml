# Copy this file to .streamlit/secrets.toml (create the .streamlit folder
# next to app.py if it doesn't exist) and fill in your own values.
#
# Everything here is optional in the sense that the app runs without it —
# but each section unlocks a specific feature:
#   [postgres]         -> persistent user storage (see note below — this is
#                          what fixes "it keeps asking me to sign up again")
#   [smtp]              -> admin email notification on signup/login
#   [sms]               -> admin SMS notification on signup/login
#   [google_oauth]      -> "Continue with Google" button
#   [facebook_oauth]    -> "Continue with Facebook" button
#
# On Streamlit Community Cloud, paste this same content into
# "App settings -> Secrets" instead of committing a real secrets.toml file
# (never commit real credentials to a public repo).

[postgres]
# Without this section, user accounts are stored in a local SQLite file.
# That works fine for local testing, but on Streamlit Community Cloud (and
# most free hosts) the local disk gets wiped whenever the app restarts,
# redeploys, or wakes up from sleeping — which looks exactly like accounts
# "disappearing" and being asked to sign up again, even though nothing is
# actually broken. Fix: create a free Postgres database (Supabase.com or
# Neon.tech both have a no-cost tier) and paste its connection string here.
# Leave this whole section commented out / removed to keep using SQLite.
# url = "postgresql://user:password@host:5432/dbname"

[smtp]
host = "smtp.gmail.com"
port = 587
username = "you@gmail.com"
# Gmail: Google Account -> Security -> 2-Step Verification -> App passwords
# Use an App Password here, not your normal Gmail password.
app_password = "xxxx xxxx xxxx xxxx"
admin_email = "punitkr.786@gmail.com"

[sms]
# Twilio (https://www.twilio.com/) — create a trial account to get these.
twilio_account_sid = "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
twilio_auth_token = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
twilio_from_number = "+1XXXXXXXXXX"   # a number Twilio gave you
admin_phone = "+919145480345"

[google_oauth]
# Google Cloud Console -> APIs & Services -> Credentials -> OAuth client ID
# (type: Web application). Add redirect_uri below to "Authorized redirect URIs".
# IMPORTANT: the "Continue with Google" button stays hidden until every
# value below is replaced with a real one — placeholder-looking values
# (anything with "xxxx" or "your-" in it) are intentionally ignored so you
# never see the broken "Error 400" screen again.
client_id = "xxxxxxxxxx.apps.googleusercontent.com"
client_secret = "xxxxxxxxxxxxxxxxxxxxxxxx"
redirect_uri = "https://your-deployed-app-url"

[facebook_oauth]
# Facebook Developers -> your app -> Facebook Login -> Settings
# Add redirect_uri below to "Valid OAuth Redirect URIs".
# Same rule as Google above: placeholder values keep this button hidden
# instead of showing Facebook's "Invalid App ID" error.
app_id = "xxxxxxxxxxxxxxx"
app_secret = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
redirect_uri = "https://your-deployed-app-url"
